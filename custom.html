<section class="custom-page">

<h1>Create Your Own Shirt</h1>

<p>Upload your design and customize your perfect T-shirt.</p>

<form class="custom-form">

<label>Full Name</label>

<input type="text" placeholder="Enter your name">

<label>Email</label>

<input type="email" placeholder="Enter your email">

<label>Phone Number</label>

<input type="tel" placeholder="+92">

<label>Select Shirt Type</label>

<select>

<option>Oversized T-Shirt</option>

<option>Regular Fit</option>

<option>Polo Shirt</option>

<option>Hoodie</option>

</select>

<label>Select Size</label>

<select>

<option>Small</option>

<option>Medium</option>

<option>Large</option>

<option>XL</option>

</select>

<label>Select Color</label>

<select>

<option>Black</option>

<option>White</option>

<option>Beige</option>

<option>Navy Blue</option>

<option>Brown</option>

</select>

<label>Upload Your Design</label>

<input type="file">

<label>Custom Text</label>

<input type="text" placeholder="Example: H A Vibe">

<label>Special Instructions</label>

<textarea rows="5" placeholder="Write your requirements here..."></textarea>

<button type="submit">

Submit Custom Order

</button>

</form>

</section>
